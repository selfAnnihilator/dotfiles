# ── Prefix ─────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix        # Ctrl+Space Ctrl+Space sends literal to app

# ── Core behaviour ──────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g escape-time 0            # no lag after Escape (crucial for Neovim)
set -g history-limit 50000
set -g display-time 1500
set -g focus-events on
set -g base-index 1             # windows start at 1, not 0
set -g pane-base-index 1
set -g renumber-windows on      # close a window → gap fills automatically
set -g mouse off                # keyboard only

# ── Vi mode ─────────────────────────────────────────────────────────────────────
set -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -sel clip"
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
bind [   copy-mode

# ── Splits ───────────────────────────────────────────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"   # vertical divider  │
bind h split-window -v -c "#{pane_current_path}"   # horizontal divider ─
unbind '"'
unbind %
unbind |
unbind -

# ── Windows & sessions ───────────────────────────────────────────────────────────
bind c new-window    -c "#{pane_current_path}"
bind d detach-client
bind k kill-session
bind w split-window -v -p 30 -c "#{pane_current_path}" \; \
       select-pane -U \; \
       split-window -h -c "#{pane_current_path}" \; \
       send-keys "claude" Enter \; \
       select-pane -L \; \
       send-keys "nvim" Enter

# ── Pane navigation (Alt+hjkl, no prefix needed) ─────────────────────────────────
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Pane resizing (prefix + arrows, repeatable) ──────────────────────────────────
bind -r Left  resize-pane -L 3
bind -r Down  resize-pane -D 3
bind -r Up    resize-pane -U 3
bind -r Right resize-pane -R 3

# ── Window switching ─────────────────────────────────────────────────────────────
bind -r n next-window
bind -r p previous-window
bind Tab last-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ── Other ────────────────────────────────────────────────────────────────────────
bind S choose-session
bind z resize-pane -Z
bind x kill-pane
bind q display-panes
bind e setw synchronize-panes \; display "sync #{?synchronize-panes,ON,OFF}"
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# ── Status bar ───────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-justify left

# colours — Noctalia palette
BG="#292514"
FG="#f3f3f2"
MUTED="#585B70"
ACCENT="#ecdb94"
RED="#fd4663"
YELLOW="#998533"

set -g status-style              "bg=${BG},fg=${FG}"
set -g message-style             "bg=${ACCENT},fg=${BG},bold"
set -g pane-border-style         "fg=${MUTED}"
set -g pane-active-border-style  "fg=${ACCENT}"
set -g mode-style                "bg=${ACCENT},fg=${BG}"

# left: session name
set -g status-left-length 30
set -g status-left "#[bg=${ACCENT},fg=${BG},bold] #S #[default] "

# window tabs: index + current directory (basename)
set -g window-status-format         "#[fg=${MUTED}] #I  #{b:pane_current_path} "
set -g window-status-current-format "#[bg=${ACCENT},fg=${BG},bold] #I  #{b:pane_current_path} #[default]"
set -g window-status-separator      ""

# right: mode indicators · time
set -g status-right-length 80
set -g status-right "#{?window_zoomed_flag,#[fg=${MUTED}]zoom ,}#{?pane_in_mode,#[fg=${MUTED}]copy ,}#{?client_prefix,#[fg=${ACCENT},bold]prefix #[default],}#[fg=${MUTED}]%a %d %b  #[fg=${FG}]%H:%M "
